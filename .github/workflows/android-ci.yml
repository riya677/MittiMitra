name: Android CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Lint + Unit Test + Debug Build
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Build Release Bundle
        run: ./gradlew :app:bundleRelease --stacktrace
